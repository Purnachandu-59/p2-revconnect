services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: revconnect
    ports:
      - "3307:3306"

  backend:
    image: revconnect-backend
    container_name: revconnect-app
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/revconnect
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

  frontend:
    image: revconnect-frontend
    container_name: revconnect-ui
    ports:
      - "4200:80"
    depends_on:
      - backend