spring.application.name=FullStackRevConnect

# SERVER CONFIG
server.port=8080



# ========================
# DATABASE CONFIGURATION
# ========================

spring.datasource.url=jdbc:mysql://localhost:3306/full_stack_rev_connect
spring.datasource.username=root
spring.datasource.password=Chandu@2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA CONFIGURATION
# ========================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect


# JWT CONFIG
app.jwt.secret=ThisIsSuperSecureSecretKeyForJWTMustBeVeryLong123456789
app.jwt.expiration=86400000


# LOGGING
logging.level.org.springframework.security=DEBUG

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
