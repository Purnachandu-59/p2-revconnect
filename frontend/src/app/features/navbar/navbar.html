<header class="navbar" [class.scrolled]="isScrolled">

  <!-- LEFT -->
  <div class="nav-left">
    <div class="logo" (click)="router.navigate(['/dashboard'])">
      <div class="logo-mark">
        <span>R</span>
      </div>
      <div class="logo-text">
        Rev<span>Connect</span>
      </div>
    </div>

    <!-- Search -->
    <div class="search-box">
      <svg viewBox="0 0 24 24" class="search-icon">
        <path d="M10 2a8 8 0 105.3 14l4.4 4.4 1.3-1.3-4.4-4.4A8 8 0 0010 2z"/>
      </svg>

      <input type="text"
             placeholder="Search users..."
             [(ngModel)]="searchTerm"
             (input)="onSearchChange(searchTerm)" />

      <!-- Dropdown -->
      <div class="search-dropdown" *ngIf="showSearchResults">

        <div *ngIf="searchResults.length === 0"
             class="search-item">
          No users found
        </div>

        <div class="search-item"
             *ngFor="let user of searchResults"
             (click)="goToUser(user.id)">

          <img [src]="user.profileImage || 'https://i.pravatar.cc/40'" />
          <span>{{ user.username }}</span>
        </div>

      </div>
    </div>
  </div>

  <!-- CENTER -->
  <nav class="nav-center">

    <!-- HOME -->
    <a routerLink="/dashboard"
       routerLinkActive="active"
       class="nav-item">
      <svg viewBox="0 0 24 24" class="icon">
        <path d="M3 12l9-9 9 9v9H3z"/>
      </svg>
      <span>Home</span>
    </a>

    <!-- NETWORK -->
    <a routerLink="/network"
       routerLinkActive="active"
       class="nav-item">
      <svg viewBox="0 0 24 24" class="icon">
        <path d="M17 20h5V4H2v16h5"/>
      </svg>
      <span>Network</span>
    </a>

    <!-- NOTIFICATIONS -->
 <div class="nav-item notification-wrapper"
     (click)="toggleNotif()">

  <svg viewBox="0 0 24 24" class="icon">
    <path d="M12 22a2 2 0 002-2h-4a2 2 0 002 2zM18 16v-5a6 6 0 10-12 0v5l-2 2h16z"/>
  </svg>
  <span>Notifications</span>

  <div class="badge" *ngIf="notifications() > 0">
    {{ notifications() }}
  </div>

  <!-- Dropdown -->
  <div class="notif-dropdown" *ngIf="showNotif">

    <div class="notif-header">
      <strong>Notifications</strong>
    </div>

    <div *ngIf="notificationsList.length === 0"
         class="notif-item">
      No notifications
    </div>

    <div class="notif-item"
         *ngFor="let notif of notificationsList"
         [class.unread]="!notif.isRead"
         (click)="handleNotificationClick(notif)">

      <p>{{ notif.message }}</p>
      <span>{{ notif.createdAt | date:'short' }}</span>

    </div>

  </div>

</div>

     <!-- CREATOR ANALYTICS -->

<a *ngIf="isCreator()"

   routerLink="/analytics"

   routerLinkActive="active"

   class="nav-item">

  <svg viewBox="0 0 24 24" class="icon">

    <path d="M3 3h2v18H3zM9 9h2v12H9zM15 6h2v15h-2zM21 12h2v9h-2z"/>

  </svg>

  <span>Analytics</span>

</a>

 

<!-- BUSINESS ANALYTICS -->

<a *ngIf="isBusiness()"

   routerLink="/business-analytics"

   routerLinkActive="active"

   class="nav-item">

  <svg viewBox="0 0 24 24" class="icon">

    <path d="M3 3h2v18H3zM9 9h2v12H9zM15 6h2v15h-2zM21 12h2v9h-2z"/>

  </svg>

  <span>Business Analytics</span>

</a>

  </nav>

  <!-- RIGHT -->
  <div class="nav-right">

    <button class="dark-toggle" (click)="toggleDarkMode()">🌙</button>

    <div class="profile-menu">
      <img class="avatar"
           src="https://i.pravatar.cc/40"
           (click)="toggleDropdown()" />

      <div class="dropdown" *ngIf="showDropdown">
        <div (click)="goToProfile()">My Profile</div>
        <div>Settings</div>
        <div class="logout" (click)="logout()">Logout</div>
      </div>
    </div>

  </div>

</header>
